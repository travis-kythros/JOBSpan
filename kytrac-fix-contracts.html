<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYTRAC — Fix Contract Values</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060e1e; color: #eaf0fb; font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: rgba(8,18,36,.9); border: 1px solid rgba(217,119,6,.3); border-radius: 16px; padding: 32px; max-width: 560px; width: 100%; }
  h1 { font-size: 1.4rem; color: #f59e0b; margin-bottom: 6px; }
  .sub { color: #94a3b8; font-size: .85rem; margin-bottom: 24px; line-height: 1.6; }
  .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-google { background: #fff; color: #1a1a1a; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-amber { background: #d97706; color: #fff; }
  .progress-track { background: rgba(255,255,255,.08); border-radius: 999px; height: 10px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 100%; background: #d97706; border-radius: 999px; width: 0%; transition: width .2s; }
  .log { display: none; background: #020810; border: 1px solid rgba(255,255,255,.06); border-radius: 10px; padding: 12px; height: 220px; overflow-y: auto; font-size: .75rem; font-family: monospace; margin-bottom: 16px; }
  .ok { color: #34d399; } .err { color: #f87171; } .info { color: #60a5fa; } .skip { color: #94a3b8; }
  .success { display: none; background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.3); border-radius: 10px; padding: 16px; text-align: center; margin-bottom: 16px; color: #34d399; font-weight: 700; }
  #authSection { display: block; } #mainSection { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Fix Contract Values</h1>
  <p class="sub">Imported jobs from JobTread have <code>approvedOrders</code> but no <code>contractValue</code>, so the dashboard shows $0. This copies <code>approvedOrders</code> → <code>contractValue</code> on all imported jobs where contractValue is 0.</p>

  <div id="authSection">
    <button class="btn btn-google" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <div id="mainSection">
    <p style="color:#34d399;font-size:.83rem;margin-bottom:16px;text-align:center">✅ Signed in</p>
    <button class="btn btn-amber" id="fixBtn" onclick="startFix()">Fix Contract Values on Imported Jobs</button>
    <div id="progressWrap" style="display:none;margin-bottom:16px">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div style="font-size:.8rem;color:#94a3b8;text-align:center;margin-top:4px" id="progressLabel">Starting...</div>
    </div>
    <div class="log" id="log"></div>
    <div class="success" id="successSection"></div>
    <button class="btn" style="background:transparent;border:1px solid rgba(217,119,6,.4);color:#f59e0b;display:none" id="openBtn" onclick="window.location.href='kytrac.html'">Open KYTRAC →</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDoFC2N0rrgwO-vY8SCPb3J-jKgSLYn5BQ",
  authDomain: "kytrac-72d91.firebaseapp.com",
  projectId: "kytrac-72d91",
  storageBucket: "kytrac-72d91.firebasestorage.app",
  messagingSenderId: "1061786207687",
  appId: "1:1061786207687:web:219bce6739311f43b205e2"
};

let db, auth, companyId;
firebase.initializeApp(FIREBASE_CONFIG);
db = firebase.firestore();
auth = firebase.auth();

auth.onAuthStateChanged(async u => {
  if (u) {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('mainSection').style.display = 'block';
    // Find company
    const snap = await db.collection('companies').where('ownerEmail','==',u.email.toLowerCase()).limit(1).get();
    if (!snap.empty) companyId = snap.docs[0].id;
  }
});

function signIn() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert('Sign in failed: ' + e.message));
}

function log(msg, cls) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function startFix() {
  if (!companyId) { alert('Company not found. Make sure you ran the migration first.'); return; }
  document.getElementById('fixBtn').disabled = true;
  document.getElementById('fixBtn').textContent = 'Working...';
  document.getElementById('progressWrap').style.display = 'block';

  const jobsRef = db.collection('companies').doc(companyId).collection('jobs');
  const snap = await jobsRef.get();
  log('Found ' + snap.size + ' total jobs', 'info');

  let fixed = 0, skipped = 0, errors = 0;
  const docs = snap.docs;

  for (let i = 0; i < docs.length; i++) {
    const doc = docs[i];
    const data = doc.data();
    const pct = Math.round((i+1)/docs.length*100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = (i+1) + '/' + docs.length + ' jobs checked';

    // Fix if contractValue is 0 or missing AND approvedOrders has a value
    const cv = data.contractValue || 0;
    const ao = data.approvedOrders || 0;

    if (cv === 0 && ao > 0) {
      try {
        await doc.ref.update({ contractValue: ao, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        fixed++;
        if (fixed % 20 === 0) log('  Fixed ' + fixed + ' jobs so far...', 'ok');
      } catch(e) {
        errors++;
        log('  Error on ' + (data.jobNumber||doc.id) + ': ' + e.message, 'err');
      }
    } else {
      skipped++;
    }

    if (i % 20 === 19) await new Promise(r => setTimeout(r, 150));
  }

  log('', '');
  log('Done! Fixed: ' + fixed + ' | Already had value: ' + skipped + ' | Errors: ' + errors, 'info');
  document.getElementById('progressLabel').textContent = 'Complete!';
  document.getElementById('successSection').style.display = 'block';
  document.getElementById('successSection').textContent = '✅ ' + fixed + ' jobs updated with contract values';
  document.getElementById('openBtn').style.display = 'block';
}
</script>
</body>
</html>
